{% extends "base.html" %}

{% block extra_title %}- Contact{% endblock %}

{% block content %}
<div class="container mt-4 mb-5">
    <div class="row justify-content-center">
        <div class="col-12 col-lg-8">
            <div class="card">
                <div class="card-body p-4 p-lg-5">
                    <h2 class="mb-3">Contact Us</h2>
                    <p class="text-muted mb-4">We are here to help with class bookings, instructor enquiries, and support.</p>

                    <div class="mb-3">
                        <h5 class="mb-1">Email</h5>
                        <a href="mailto:support@classbooking.com">support@classbooking.com</a>
                    </div>

                    <div class="mb-3">
                        <h5 class="mb-1">Phone</h5>
                        <a href="tel:+441234567890">+44 1234 567890</a>
                    </div>

                    <div class="mb-0">
                        <h5 class="mb-2">Social</h5>
                        <div class="d-flex flex-wrap gap-2">
                            <a class="btn btn-outline-primary btn-sm" href="https://www.instagram.com" target="_blank" rel="noopener noreferrer">Instagram</a>
                            <a class="btn btn-outline-primary btn-sm" href="https://www.facebook.com" target="_blank" rel="noopener noreferrer">Facebook</a>
                            <a class="btn btn-outline-primary btn-sm" href="https://x.com/" target="_blank" rel="noopener noreferrer">X</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
