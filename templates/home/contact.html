{% extends "base.html" %}

{% block extra_title %}- Contact{% endblock %}

{% block content %}
<div class="container mt-4 mb-5">
    <div class="row justify-content-center">
        <div class="col-12 col-lg-9 col-xl-8">
            <div class="card">
                <div class="card-body p-4 p-lg-5">
                    <h2 class="mb-3">Contact Us</h2>
                    <p class="text-muted mb-4">Please complete the form below and we will get back to you shortly.</p>

                    <form method="post" action="{% url 'contact' %}" novalidate>
                        {% csrf_token %}
                        <div class="row g-3">
                            <div class="col-12 col-md-6">
                                <label for="name" class="form-label">Name</label>
                                <input type="text" id="name" name="name" class="form-control" value="{{ form_data.name|default:'' }}" required>
                            </div>
                            <div class="col-12 col-md-6">
                                <label for="phone" class="form-label">Phone</label>
                                <input type="tel" id="phone" name="phone" class="form-control" value="{{ form_data.phone|default:'' }}" required>
                            </div>
                            <div class="col-12 col-md-6">
                                <label for="email" class="form-label">Email</label>
                                <input type="email" id="email" name="email" class="form-control" value="{{ form_data.email|default:'' }}" required>
                            </div>
                            <div class="col-12 col-md-6">
                                <label for="class_type" class="form-label">Class Type</label>
                                <select id="class_type" name="class_type" class="form-select" required>
                                    <option value="">Select class type</option>
                                    {% for category in categories %}
                                        <option value="{{ category.name }}" {% if form_data.class_type == category.name %}selected{% endif %}>{{ category.get_friendly_name|default:category.name }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                            <div class="col-12">
                                <label for="message" class="form-label">Message</label>
                                <textarea id="message" name="message" rows="5" class="form-control" required>{{ form_data.message|default:'' }}</textarea>
                            </div>
                            <div class="col-12 d-flex justify-content-end">
                                <button type="submit" class="btn btn-primary px-4">Send Message</button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
